    <title>Proofread — Laravel-native AI evals</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('proofread:color-scheme');
          if (stored !== 'light' && stored !== 'dark' && stored !== 'system') {
            var legacy = localStorage.getItem('proofread-theme');
            if (legacy === 'light' || legacy === 'dark') stored = legacy;
          }
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((stored === 'system' || !stored) && prefersDark);
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {}
      })();
    </script>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
